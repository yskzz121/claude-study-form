<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude 勉強会 参加申し込み</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      width: 100%;
      max-width: 640px;
    }

    /* ヘッダーカード */
    .header-card {
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      border-radius: 12px 12px 0 0;
      padding: 36px 32px;
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    .header-card::after {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 160px; height: 160px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
    }
    .header-card h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .header-card p {
      font-size: 0.95rem;
      opacity: 0.9;
      line-height: 1.6;
    }
    .header-bar {
      height: 6px;
      background: linear-gradient(90deg, #6c5ce7, #a29bfe, #74b9ff);
      border-radius: 0;
    }

    /* フォームカード */
    .form-card {
      background: #fff;
      border-radius: 0 0 12px 12px;
      padding: 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .field {
      margin-bottom: 28px;
    }
    .field label {
      display: block;
      font-weight: 500;
      font-size: 0.95rem;
      margin-bottom: 8px;
    }
    .field label .required {
      color: #e74c3c;
      font-size: 0.8rem;
      margin-left: 4px;
    }
    .field label .optional {
      color: #999;
      font-size: 0.8rem;
      margin-left: 4px;
    }

    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #fafbfc;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #6c5ce7;
      box-shadow: 0 0 0 3px rgba(108,92,231,0.12);
      background: #fff;
    }
    textarea { resize: vertical; min-height: 100px; }

    /* ラジオボタン */
    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .radio-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border: 1.5px solid #e8e8e8;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .radio-item:hover {
      border-color: #a29bfe;
      background: #f8f7ff;
    }
    .radio-item input[type="radio"] {
      accent-color: #6c5ce7;
      width: 18px; height: 18px;
      cursor: pointer;
    }
    .radio-item input[type="radio"]:checked + span {
      font-weight: 500;
      color: #6c5ce7;
    }
    .radio-item:has(input:checked) {
      border-color: #6c5ce7;
      background: #f8f7ff;
    }

    /* 送信ボタン */
    .submit-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      color: #fff;
      border: none;
      padding: 14px 36px;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(108,92,231,0.3);
    }
    .submit-btn:active { transform: translateY(0); }
    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* 完了メッセージ */
    .success-message {
      display: none;
      text-align: center;
      padding: 48px 24px;
    }
    .success-message .icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }
    .success-message h2 {
      font-size: 1.3rem;
      margin-bottom: 12px;
      color: #2d3436;
    }
    .success-message p {
      color: #636e72;
      line-height: 1.6;
    }

    /* エラー */
    .field-error {
      color: #e74c3c;
      font-size: 0.82rem;
      margin-top: 6px;
      display: none;
    }
    .field.has-error input,
    .field.has-error textarea {
      border-color: #e74c3c;
    }
    .field.has-error .field-error {
      display: block;
    }

    @media (max-width: 480px) {
      body { padding: 20px 12px; }
      .header-card { padding: 28px 20px; }
      .header-card h1 { font-size: 1.3rem; }
      .form-card { padding: 24px 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-card">
      <h1>Claude 勉強会 参加申し込み</h1>
      <p>以下のフォームに必要事項をご記入のうえ、送信してください。</p>
    </div>
    <div class="header-bar"></div>
    <div class="form-card">
      <form id="registrationForm">

        <div class="field">
          <label>お名前<span class="required">*必須</span></label>
          <input type="text" name="name" required placeholder="例：山田 太郎">
          <div class="field-error">お名前を入力してください</div>
        </div>

        <div class="field">
          <label>メールアドレス<span class="required">*必須</span></label>
          <input type="email" name="email" required placeholder="例：taro@example.com">
          <div class="field-error">正しいメールアドレスを入力してください</div>
        </div>

        <div class="field">
          <label>所属・職種<span class="optional">任意</span></label>
          <input type="text" name="affiliation" placeholder="例：株式会社〇〇 / エンジニア">
        </div>

        <div class="field">
          <label>Claude の利用経験<span class="required">*必須</span></label>
          <div class="radio-group">
            <label class="radio-item">
              <input type="radio" name="experience" value="使ったことがない" required>
              <span>使ったことがない</span>
            </label>
            <label class="radio-item">
              <input type="radio" name="experience" value="少し使っている">
              <span>少し使っている</span>
            </label>
            <label class="radio-item">
              <input type="radio" name="experience" value="よく使っている">
              <span>よく使っている</span>
            </label>
          </div>
          <div class="field-error">いずれかを選択してください</div>
        </div>

        <div class="field">
          <label>勉強会で知りたいこと・期待すること<span class="optional">任意</span></label>
          <textarea name="expectations" placeholder="例：Claude Code の使い方を知りたい、業務活用のヒントがほしい　など"></textarea>
        </div>

        <div class="field">
          <label>備考<span class="optional">任意</span></label>
          <textarea name="remarks" placeholder="その他、ご質問やご要望があればご記入ください" rows="3"></textarea>
        </div>

        <button type="submit" class="submit-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
          送信する
        </button>
      </form>

      <div class="success-message" id="successMessage">
        <div class="icon">&#10003;</div>
        <h2>お申し込みありがとうございます！</h2>
        <p>参加登録を受け付けました。<br>詳細は追ってメールでご連絡いたします。</p>
      </div>
    </div>
  </div>

  <script>
    // ============================================
    // Google Apps Script のウェブアプリURL をここに貼り付け
    // ============================================
    const SCRIPT_URL = '__YOUR_GAS_WEB_APP_URL__';

    const form = document.getElementById('registrationForm');
    const successMessage = document.getElementById('successMessage');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      // バリデーション
      let valid = true;
      form.querySelectorAll('.field').forEach(f => f.classList.remove('has-error'));

      const name = form.name.value.trim();
      const email = form.email.value.trim();
      const experience = form.experience.value;

      if (!name) {
        form.name.closest('.field').classList.add('has-error');
        valid = false;
      }
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        form.email.closest('.field').classList.add('has-error');
        valid = false;
      }
      if (!experience) {
        form.experience[0].closest('.field').classList.add('has-error');
        valid = false;
      }
      if (!valid) return;

      // 送信
      const btn = form.querySelector('.submit-btn');
      btn.disabled = true;
      btn.textContent = '送信中...';

      const data = {
        name,
        email,
        affiliation: form.affiliation.value.trim(),
        experience,
        expectations: form.expectations.value.trim(),
        remarks: form.remarks.value.trim(),
        timestamp: new Date().toLocaleString('ja-JP')
      };

      try {
        if (SCRIPT_URL === '__YOUR_GAS_WEB_APP_URL__') {
          // GAS未設定の場合はデモモード
          console.log('送信データ:', data);
          await new Promise(r => setTimeout(r, 800));
        } else {
          await fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
          });
        }
        form.style.display = 'none';
        successMessage.style.display = 'block';
      } catch (err) {
        alert('送信に失敗しました。もう一度お試しください。');
        btn.disabled = false;
        btn.textContent = '送信する';
      }
    });
  </script>
</body>
</html>
