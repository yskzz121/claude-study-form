<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude 勉強会 参加申し込み</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0b1628;
      --navy-light: #111d33;
      --gold: #d4a843;
      --gold-light: #f0d078;
      --cyan: #38bdf8;
      --purple: #a78bfa;
      --text: #e8ecf1;
      --text-dim: #8b95a5;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--navy);
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      width: 100%;
      max-width: 640px;
    }

    /* ヘッダーカード */
    .header-card {
      background:
        radial-gradient(ellipse at 30% 20%, rgba(212,168,67,.1) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 80%, rgba(74,144,217,.08) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 50%, rgba(167,139,250,.05) 0%, transparent 50%),
        var(--navy);
      border-radius: 12px 12px 0 0;
      padding: 40px 32px 36px;
      color: var(--text);
      position: relative;
      overflow: hidden;
    }
    /* グリッドパターン */
    .header-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(212,168,67,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(212,168,67,.06) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
      pointer-events: none;
    }
    /* グロー装飾 */
    .header-card::after {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(212,168,67,.12), transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    .header-content {
      position: relative;
      z-index: 1;
    }
    /* Claude マスコット */
    .mascot-row {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-bottom: 20px;
    }
    .claude-mascot {
      width: 80px;
      height: 80px;
      animation: float 6s ease-in-out infinite;
      object-fit: contain;
      filter: drop-shadow(0 4px 12px rgba(217,119,87,.3));
    }
    /* タイトルエリア */
    .header-title-area {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-bottom: 20px;
    }
    /* 主催バー */
    .organizer-bar {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding-top: 16px;
      border-top: 1px solid rgba(212,168,67,.12);
    }
    .organizer-bar span {
      font-size: 0.72rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }
    .organizer-logo {
      height: 22px;
      width: auto;
      object-fit: contain;
      filter: brightness(0) invert(0.85);
      opacity: 0.8;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    .header-card .label {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--navy);
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      padding: 3px 10px;
      border-radius: 4px;
      margin-bottom: 12px;
    }
    .header-card h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(90deg, var(--gold-light), #fff, var(--gold-light));
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s ease-in-out infinite;
    }
    .header-card p {
      font-size: 0.92rem;
      color: var(--text-dim);
      line-height: 1.6;
    }
    .header-bar {
      height: 4px;
      background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--cyan), var(--purple));
      border-radius: 0;
    }

    /* フォームカード */
    .form-card {
      background: var(--navy-light);
      border: 1px solid rgba(212,168,67,.1);
      border-top: none;
      border-radius: 0 0 12px 12px;
      padding: 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }

    .field {
      margin-bottom: 28px;
    }
    .field label {
      display: block;
      font-weight: 500;
      font-size: 0.95rem;
      margin-bottom: 8px;
      color: var(--text);
    }
    .field label .required {
      color: #f85149;
      font-size: 0.8rem;
      margin-left: 4px;
    }
    .field label .optional {
      color: var(--text-dim);
      font-size: 0.8rem;
      margin-left: 4px;
    }

    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid rgba(212,168,67,.15);
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: rgba(255,255,255,.04);
      color: var(--text);
    }
    input::placeholder, textarea::placeholder {
      color: var(--text-dim);
      opacity: 0.6;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(212,168,67,0.12);
      background: rgba(255,255,255,.06);
    }
    textarea { resize: vertical; min-height: 100px; }

    /* ラジオボタン */
    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .radio-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border: 1.5px solid rgba(212,168,67,.12);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text);
    }
    .radio-item:hover {
      border-color: rgba(212,168,67,.35);
      background: rgba(212,168,67,.04);
    }
    .radio-item input[type="radio"] {
      accent-color: var(--gold);
      width: 18px; height: 18px;
      cursor: pointer;
    }
    .radio-item input[type="radio"]:checked + span {
      font-weight: 500;
      color: var(--gold-light);
    }
    .radio-item:has(input:checked) {
      border-color: var(--gold);
      background: rgba(212,168,67,.06);
    }

    /* 送信ボタン */
    .submit-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--navy);
      border: none;
      padding: 14px 36px;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(212,168,67,0.35);
    }
    .submit-btn:active { transform: translateY(0); }
    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* 完了メッセージ */
    .success-message {
      display: none;
      text-align: center;
      padding: 48px 24px;
    }
    .success-message .icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }
    .success-message h2 {
      font-size: 1.3rem;
      margin-bottom: 12px;
      color: var(--gold-light);
    }
    .success-message p {
      color: var(--text-dim);
      line-height: 1.6;
    }

    /* エラー */
    .field-error {
      color: #f85149;
      font-size: 0.82rem;
      margin-top: 6px;
      display: none;
    }
    .field.has-error input,
    .field.has-error textarea {
      border-color: #f85149;
    }
    .field.has-error .field-error {
      display: block;
    }

    @media (max-width: 480px) {
      body { padding: 20px 12px; }
      .header-card { padding: 28px 20px; }
      .header-card h1 { font-size: 1.3rem; }
      .claude-mascot { width: 56px; height: 56px; }
      .claude-mascot { width: 64px; height: 64px; }
      .mascot-row { margin-bottom: 16px; }
      .organizer-logo { height: 18px; }
      .form-card { padding: 24px 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-card">
      <div class="header-content">
        <div class="mascot-row">
          <img src="clawd_logo.png" alt="Clawd" class="claude-mascot">
        </div>
        <!-- タイトルエリア -->
        <div class="header-title-area">
          <span class="label">REGISTRATION FORM</span>
          <h1>Claude 勉強会 参加申し込み</h1>
          <p>以下のフォームに必要事項をご記入のうえ、送信してください。</p>
        </div>
        <!-- 主催 -->
        <div class="organizer-bar">
          <span>Organized by</span>
          <img src="uandi_logo.png" alt="U&I" class="organizer-logo">
        </div>
      </div>
    </div>
    <div class="header-bar"></div>
    <div class="form-card">
      <form id="registrationForm">

        <div class="field">
          <label>お名前<span class="required">*必須</span></label>
          <input type="text" name="name" required placeholder="例：山田 太郎">
          <div class="field-error">お名前を入力してください</div>
        </div>

        <div class="field">
          <label>メールアドレス<span class="required">*必須</span></label>
          <input type="email" name="email" required placeholder="例：taro@example.com">
          <div class="field-error">正しいメールアドレスを入力してください</div>
        </div>

        <div class="field">
          <label>所属・職種<span class="optional">任意</span></label>
          <input type="text" name="affiliation" placeholder="例：株式会社〇〇 / エンジニア">
        </div>

        <div class="field">
          <label>Claude の利用経験<span class="required">*必須</span></label>
          <div class="radio-group">
            <label class="radio-item">
              <input type="radio" name="experience" value="使ったことがない" required>
              <span>使ったことがない</span>
            </label>
            <label class="radio-item">
              <input type="radio" name="experience" value="少し使っている">
              <span>少し使っている</span>
            </label>
            <label class="radio-item">
              <input type="radio" name="experience" value="よく使っている">
              <span>よく使っている</span>
            </label>
          </div>
          <div class="field-error">いずれかを選択してください</div>
        </div>

        <div class="field">
          <label>勉強会で知りたいこと・期待すること<span class="optional">任意</span></label>
          <textarea name="expectations" placeholder="例：Claude Code の使い方を知りたい、業務活用のヒントがほしい　など"></textarea>
        </div>

        <div class="field">
          <label>備考<span class="optional">任意</span></label>
          <textarea name="remarks" placeholder="その他、ご質問やご要望があればご記入ください" rows="3"></textarea>
        </div>

        <button type="submit" class="submit-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
          送信する
        </button>
      </form>

      <div class="success-message" id="successMessage">
        <div class="icon">&#10003;</div>
        <h2>お申し込みありがとうございます！</h2>
        <p>参加登録を受け付けました。<br>詳細は追ってメールでご連絡いたします。</p>
      </div>
    </div>
  </div>

  <script>
    // ============================================
    // Google Apps Script のウェブアプリURL をここに貼り付け
    // ============================================
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxkO-vltfPtLNDhX_I_UMevrf792I9rKIiRuC9ojdeYNgOh06WvUHTNAJaSSJZq7LC-_g/exec';

    const form = document.getElementById('registrationForm');
    const successMessage = document.getElementById('successMessage');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      // バリデーション
      let valid = true;
      form.querySelectorAll('.field').forEach(f => f.classList.remove('has-error'));

      const name = form.name.value.trim();
      const email = form.email.value.trim();
      const experience = form.experience.value;

      if (!name) {
        form.name.closest('.field').classList.add('has-error');
        valid = false;
      }
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        form.email.closest('.field').classList.add('has-error');
        valid = false;
      }
      if (!experience) {
        form.experience[0].closest('.field').classList.add('has-error');
        valid = false;
      }
      if (!valid) return;

      // 送信
      const btn = form.querySelector('.submit-btn');
      btn.disabled = true;
      btn.textContent = '送信中...';

      const data = {
        name,
        email,
        affiliation: form.affiliation.value.trim(),
        experience,
        expectations: form.expectations.value.trim(),
        remarks: form.remarks.value.trim(),
        timestamp: new Date().toLocaleString('ja-JP')
      };

      try {
        await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(data)
        });
        form.style.display = 'none';
        successMessage.style.display = 'block';
      } catch (err) {
        console.error('送信エラー:', err);
        alert('送信に失敗しました。もう一度お試しください。');
        btn.disabled = false;
        btn.textContent = '送信する';
      }
    });
  </script>
</body>
</html>
